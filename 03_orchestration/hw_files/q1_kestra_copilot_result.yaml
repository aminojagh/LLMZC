    type: io.kestra.plugin.gcp.bigquery.Load
    from: https://storage.googleapis.com/cloud-samples-data/bigquery/sample-data/nyc_taxi_trips.csv
    destinationTable: your_project.your_dataset.nyc_taxi_trips
    format: CSV
    csvOptions:
      skipLeadingRows: 1